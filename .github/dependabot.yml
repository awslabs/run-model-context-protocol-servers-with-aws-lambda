version: 2
updates:
  - package-ecosystem: uv
    directory: "/src/python"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: "chore(deps)"
    rebase-strategy: "disabled"
    groups:
      python-src:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: "/e2e_tests/python"
